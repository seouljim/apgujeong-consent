<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>압구정3구역 공동신청 관리자</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif;margin:0;background:#f5f7fb;color:#111827}
    .wrap{max-width:1180px;margin:0 auto;padding:20px}
    .card{background:white;border:1px solid #d9e0ee;border-radius:14px;padding:18px;margin:12px 0}
    h1{color:#0b2e6f}
    input{padding:10px;border:1px solid #d1d5db;border-radius:8px;width:280px;max-width:100%}
    button{padding:10px 14px;border:0;border-radius:8px;font-weight:800;cursor:pointer;background:#0b2e6f;color:white;margin:4px}
    table{width:100%;border-collapse:collapse;background:white;font-size:13px}
    th,td{border:1px solid #d1d5db;padding:7px;text-align:left;vertical-align:middle}
    th{background:#eef2ff}
    img.sig{width:130px;max-height:60px}
    .print-title{display:none}
    .small{font-size:13px;color:#6b7280}
    @media print{
      .noprint{display:none!important}
      body{background:white}
      .card{border:0;margin:0;padding:0}
      .print-title{display:block;text-align:center;color:#111827}
      table{font-size:11px}
      img.sig{width:110px}
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1 class="noprint">공동신청 관리자</h1>
  <h1 class="print-title">압구정3구역 자료복사 공동신청인 명부</h1>

  <div class="card noprint">
    <p>관리자 이메일로 로그인 후 명부를 조회합니다.</p>
    <input id="email" type="email" placeholder="관리자 이메일">
    <button onclick="sendMagicLink()">로그인 링크 받기</button>
    <button onclick="loadData()">명부 불러오기</button>
    <button onclick="downloadCSV()">CSV 다운로드</button>
    <button onclick="window.print()">명부 인쇄</button>
    <p id="msg" class="small"></p>
  </div>

  <div class="card">
    <div id="summary" style="margin-bottom:12px"></div>
    <table id="tbl">
      <thead><tr><th>번호</th><th>성명</th><th>동</th><th>호수</th><th>연락처 뒤4</th><th>구분</th><th>제출일시</th><th>서명</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://nzwhbhxmxsfqdgfepfds.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56d2hiaHhteHNmcWRnZmVwZmRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MDc4OTksImV4cCI6MjA5ODE4Mzg5OX0.K8uKDAS-10E9SI6gi7Kt-M1-8m44Ni6N0wnm6xApRd4";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let rows = [];

  function msg(t){document.getElementById('msg').innerText=t;}

  async function sendMagicLink(){
    const email = document.getElementById('email').value.trim();
    if(!email) return msg('이메일을 입력하세요.');
    const {error} = await supabaseClient.auth.signInWithOtp({ email });
    msg(error ? error.message : '로그인 링크를 이메일로 발송했습니다. 메일에서 링크를 눌러 다시 접속하세요.');
  }

  async function loadData(){
    if(SUPABASE_URL.includes('YOUR_') || SUPABASE_ANON_KEY.includes('YOUR_')) return msg('관리자가 Supabase 설정값을 아직 입력하지 않았습니다.');
    const { data, error } = await supabaseClient.from('consents').select('*').order('created_at',{ascending:true});
    if(error) return msg('조회 오류: '+error.message);
    rows = data || [];
    render();
  }

  function render(){
    document.getElementById('summary').innerHTML = `<b>총 참여자: ${rows.length}명</b>`;
    const tb = document.querySelector('#tbl tbody');
    tb.innerHTML = '';
    rows.forEach((r,i)=>{
      const tr=document.createElement('tr');
      tr.innerHTML = `<td>${i+1}</td><td>${escapeHtml(r.name)}</td><td>${escapeHtml(r.building)}</td><td>${escapeHtml(r.unit)}</td><td>${escapeHtml(r.phone_last4||'')}</td><td>${escapeHtml(r.role||'')}</td><td>${new Date(r.created_at).toLocaleString('ko-KR')}</td><td><img class="sig" src="${r.signature_png}"></td>`;
      tb.appendChild(tr);
    });
  }

  function escapeHtml(s){return (s||'').replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));}

  function downloadCSV(){
    const headers=['번호','성명','동','호수','연락처뒤4','구분','제출일시'];
    const lines=[headers.join(',')];
    rows.forEach((r,i)=>{
      lines.push([i+1,r.name,r.building,r.unit,r.phone_last4||'',r.role||'',new Date(r.created_at).toLocaleString('ko-KR')].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
    });
    const blob=new Blob(["\ufeff"+lines.join('\n')],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='apgujeong_consents.csv'; a.click();
  }
</script>
</body>
</html>
